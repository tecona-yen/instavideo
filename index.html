<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Instavideo</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <header class="topbar" id="site-header">
    <div class="brand">
      <div class="brand__title">Instavideo</div>
      <div class="brand__subtitle">A “Tecona Yen” Project</div>
    </div>
    <nav class="topbar__nav">
      <a class="navlink" href="https://github.com/tecona-yen/instavideo" target="_blank" rel="noopener noreferrer">Github</a>
      <a class="navlink" href="./about.html">About</a>
    </nav>
  </header>

  <main id="site-main">
    <section id="start-screen" class="screen active">
      <div class="hero">
        <div class="hero__title"><img src="logo.gif" alt="instavideo logo", width="600", height="150"></div>

        <h1 class="hero__headline">A minimalist short video scrolling platform</h1>
        <p class="hero__lede">
          Mobile-first, fast, and intentionally simple — with algorithm controls you can actually edit.
        </p>

        <div class="hero__actions">
          <button id="start-button" class="btn btn--primary btn--xl" type="button">
            Start scrolling
          </button>

          <button id="start-controls-button" class="btn btn--ghost btn--xl" type="button">
            Customize algorithm
          </button>
        </div>

        <p class="hero__hint">
          Tip: Use swipe (mobile) or arrow keys (desktop) for next video.
        </p>
      </div>
    </section>

    <section id="feed-screen" class="screen">
      <div id="video-stage" class="video-stage" aria-live="polite"></div>

      <button id="controls-button" class="overlay-btn overlay-btn--top-left" type="button" aria-label="Open controls">
        Controls
      </button>

      <div class="overlay-right">
        <button id="like-button" class="pill-btn" type="button" aria-label="Like">👍</button>
        <button id="dislike-button" class="pill-btn" type="button" aria-label="Dislike">👎</button>
        <button id="sound-button" class="pill-btn" type="button" aria-label="Toggle sound">🔊</button>
      </div>

      <div id="hashtags" class="hashtags" aria-label="Video tags"></div>
    </section>
  </main>

  <aside id="controls-drawer" class="drawer" hidden aria-label="Algorithm controls">
    <div class="drawer__header">
      <div class="drawer__title">Algorithm controls</div>
      <button id="close-controls" class="icon-btn" type="button" aria-label="Close controls">✕</button>
    </div>

    <div class="drawer__body" id="drawer-body">
      <div class="control-group">
        <label class="control-label" for="strength-slider">Personalization strength</label>
        <div class="control-row">
          <input id="strength-slider" type="range" min="0" max="1" step="0.01" />
          <span id="strength-value" class="control-value">0.70</span>
        </div>
      </div>

      <div class="control-group">
        <label class="control-label" for="exploration-slider">Randomness / exploration</label>
        <div class="control-row">
          <input id="exploration-slider" type="range" min="0" max="1" step="0.01" />
          <span id="exploration-value" class="control-value">0.20</span>
        </div>
      </div>

      <div class="control-group control-row">
        <label class="control-label" for="override-toggle">Enable manual tag overrides</label>
        <input id="override-toggle" type="checkbox" />
      </div>

      <div class="control-group control-row">
        <label class="control-label" for="shuffle-toggle">Shuffle mode</label>
        <input id="shuffle-toggle" type="checkbox" />
      </div>

      <div class="control-group">
        <label class="control-label" for="tag-search">Search tags</label>
        <input id="tag-search" class="text-input" type="text" placeholder="e.g. #ai, #gaming, #news" />
      </div>

      <div id="tag-list" class="tag-list" role="list"></div>

      <div class="drawer__actions">
        <button id="reset-overrides" class="btn btn--ghost" type="button">Reset overrides</button>
        <button id="randomize-overrides" class="btn btn--ghost" type="button">Randomise overrides</button>
        <button id="reset-profile" class="btn btn--ghost" type="button">Reset learned profile</button>
        <button id="reset-history" class="btn btn--ghost" type="button">Reset history</button>
      </div>
    </div>
  </aside>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
